<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SkillMap — Discover Your Skills</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; overflow: hidden; }
  body { background: #060d1a; color: #f1f5f9; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #070e1c; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
  input, textarea, button { font-family: inherit; }
  input::placeholder { color: #334155; }
  @keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .msg-in { animation: fadeIn 0.3s ease; }
  .chip:hover { border-color: #6366f1 !important; color: #a5b4fc !important; transform: translateY(-1px); transition: all 0.15s; }
  .cluster-btn:hover { border-color: #6366f1 !important; background: #0f172a !important; transform: translateY(-1px); transition: all 0.15s; }
  .update-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 30px #6366f166 !important; transition: all 0.2s; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── All API calls go through the Netlify proxy function ──
const API = "/.netlify/functions/claude";

const RINGS = [
  {
    id: "core", label: "Core Employability", sublabel: "Reliability · Empathy · Punctuality · Initiative",
    color: "#f59e0b", glow: "#fbbf24", radius: 108, thickness: 13,
    skills: ["Punctuality","Reliability","Empathy","Patience","Honesty","Work Ethic","Adaptability","Positivity","Collaboration","Initiative","Integrity","Enthusiasm"],
  },
  {
    id: "durable", label: "Durable Skills", sublabel: "Communication · Leadership · Problem-Solving",
    color: "#10b981", glow: "#34d399", radius: 140, thickness: 12,
    skills: ["Communication","Leadership","Teamwork","Critical Thinking","Problem-Solving","Time Management","Conflict Resolution","Decision Making","Mentoring","Negotiation","Creativity","Resilience"],
  },
  {
    id: "technical", label: "Technical Skills", sublabel: "Tools · Systems · Domain Knowledge",
    color: "#818cf8", glow: "#a5b4fc", radius: 168, thickness: 11,
    skills: ["Data Analysis","Project Management","Customer Service","Budgeting","Training","Writing","Research","Digital Tools","Inventory","Scheduling","Sales","Operations","Logistics","Finance","Marketing"],
  },
];

const LEVEL_TITLES = ["Explorer","Discoverer","Achiever","Pathfinder","Champion","Legend"];
const XP_PER_MSG = 40;
const LEVEL_XP = [0,200,500,900,1400,2000];
function getLevel(xp) { let l=0; LEVEL_XP.forEach((v,i)=>{ if(xp>=v) l=i; }); return l; }
function getLevelPct(xp) { const l=getLevel(xp),base=LEVEL_XP[l],next=LEVEL_XP[l+1]||LEVEL_XP[l]+1000; return (xp-base)/(next-base); }

const COACH_SYSTEM = `You are SkillMap Coach — a warm, encouraging career mentor. Your audience: career changers, parents returning to work, recent graduates, people without degrees. Many feel they have "nothing on their resume." Your job is to change that.

RULES:
- Ask ONE question at a time. Never more.
- Opening: Ask something very easy like "Tell me about something you've done — at work, home, or life — that you felt good about. Anything counts."
- When someone gives a humble/simple answer (e.g. "I stocked shelves", "I raised my kids", "I worked in a cafe"), ALWAYS respond by enthusiastically naming the REAL workforce skills hidden in that experience. Be specific. E.g.: "Looking after children actually builds an incredible range of skills — scheduling and time management, teaching and patience, conflict resolution, crisis management, emotional intelligence, and even budgeting. These are genuinely valued skills in healthcare, education, admin, and management roles."
- After naming skills, ask a natural follow-up to dig deeper.
- Every 2-3 exchanges, briefly affirm a skill theme you're noticing.
- After 5-6 user messages, tell them they can click "Update My Profile" on the right to see their skills map build in real time.
- Tone: warm, specific, like a brilliant friend who happens to know a lot about careers. Never patronising. Never use jargon.
- Max 4 sentences per response. No bullet points. Conversational only.`;

function ArcRing({ ring, fill, pulse, size }) {
  const canvasRef = useRef(null);
  const state = useRef({ fill: 0, pulse: 0 });
  const raf = useRef(null);
  useEffect(() => { if (pulse) state.current.pulse = 1.0; }, [pulse]);
  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const cx = size/2, cy = size/2, scale = size/380;
    const r = ring.radius * scale, th = ring.thickness * scale;
    const draw = () => {
      state.current.fill += (fill - state.current.fill) * 0.055;
      if (state.current.pulse > 0) state.current.pulse -= 0.025;
      const f = state.current.fill, p = state.current.pulse;
      ctx.clearRect(0, 0, size, size);
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
      ctx.strokeStyle = ring.color + "1a"; ctx.lineWidth = th; ctx.stroke();
      if (f > 0.005) {
        const startA = -Math.PI/2, endA = startA + Math.PI*2*f;
        if (p > 0.05) {
          ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, startA, endA);
          ctx.strokeStyle = ring.glow + "55"; ctx.lineWidth = th + p*14*scale;
          ctx.lineCap = "round"; ctx.shadowColor = ring.glow; ctx.shadowBlur = 24 + p*20;
          ctx.stroke(); ctx.restore();
        }
        ctx.save(); ctx.beginPath(); ctx.arc(cx, cy, r, startA, endA);
        ctx.strokeStyle = ring.color; ctx.lineWidth = th; ctx.lineCap = "round";
        ctx.shadowColor = ring.glow; ctx.shadowBlur = 10; ctx.stroke(); ctx.restore();
        const dx = cx + Math.cos(endA)*r, dy = cy + Math.sin(endA)*r;
        ctx.save(); ctx.beginPath(); ctx.arc(dx, dy, th*0.72, 0, Math.PI*2);
        ctx.fillStyle = "#fff"; ctx.shadowColor = ring.glow; ctx.shadowBlur = 16;
        ctx.fill(); ctx.restore();
      }
      raf.current = requestAnimationFrame(draw);
    };
    raf.current = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(raf.current);
  }, [fill, ring, size]);
  return <canvas ref={canvasRef} width={size} height={size} style={{position:"absolute",top:0,left:0}} />;
}

function Avatar({ size, name }) {
  const orbSize = size * 0.265;
  return (
    <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",
      width:orbSize,height:orbSize,borderRadius:"50%",
      background:"radial-gradient(circle at 38% 35%, #1a2744, #060d1a)",
      border:"1.5px solid #1e293b",
      display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",
      boxShadow:"0 0 40px #818cf811, inset 0 0 24px #0007"}}>
      <svg width={orbSize*0.52} height={orbSize*0.56} viewBox="0 0 56 66" fill="none">
        <defs>
          <radialGradient id="sg" cx="38%" cy="30%">
            <stop offset="0%" stopColor="#818cf8" stopOpacity="0.5"/>
            <stop offset="100%" stopColor="#818cf8" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="28" cy="18" r="12" fill="#1e293b"/>
        <circle cx="28" cy="18" r="12" fill="url(#sg)"/>
        <ellipse cx="28" cy="50" rx="19" ry="13" fill="#1e293b"/>
        <ellipse cx="28" cy="50" rx="19" ry="13" fill="url(#sg)" opacity="0.6"/>
      </svg>
      {name && <div style={{color:"#94a3b8",fontSize:orbSize*0.1,fontWeight:700,marginTop:2,textAlign:"center",padding:"0 4px",lineHeight:1.2}}>{name.split(" ")[0]}</div>}
    </div>
  );
}

function ProfilePanel({ skills, xp, pulseRing, userName }) {
  const [tab, setTab] = useState("profile");
  const containerRef = useRef(null);
  const [size, setSize] = useState(340);
  useEffect(() => {
    const obs = new ResizeObserver(e => { const w=e[0].contentRect.width; setSize(Math.min(Math.max(w-32,200),400)); });
    if (containerRef.current) obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  const ringFills = {};
  RINGS.forEach(ring => {
    const found = skills.filter(s => ring.skills.some(rs => s.name.toLowerCase().includes(rs.toLowerCase().slice(0,5)) || rs.toLowerCase().includes(s.name.toLowerCase().slice(0,5)))).length;
    ringFills[ring.id] = Math.min(found / ring.skills.length, 1);
  });

  const byRing = { core:[], durable:[], technical:[], other:[] };
  skills.forEach(s => {
    let placed = false;
    for (const ring of RINGS) {
      if (ring.skills.some(rs => s.name.toLowerCase().includes(rs.toLowerCase().slice(0,5)) || rs.toLowerCase().includes(s.name.toLowerCase().slice(0,5)))) {
        byRing[ring.id].push(s); placed = true; break;
      }
    }
    if (!placed) byRing.other.push(s);
  });

  const level = getLevel(xp), lvlPct = getLevelPct(xp);
  const TABS = [{id:"profile",icon:"🧠",label:"Profile"},{id:"skills",icon:"⚡",label:"Skills"},{id:"careers",icon:"🚀",label:"Careers"}];

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#070e1c"}}>
      <div style={{display:"flex",borderBottom:"1px solid #0f172a",flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"11px 4px",border:"none",background:"transparent",cursor:"pointer",color:tab===t.id?"#f1f5f9":"#475569",fontWeight:tab===t.id?700:500,fontSize:12,borderBottom:`2px solid ${tab===t.id?"#818cf8":"transparent"}`,transition:"color 0.2s"}}>{t.icon} {t.label}</button>
        ))}
      </div>
      <div ref={containerRef} style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
        {tab==="profile" && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,background:"#0f172a",borderRadius:20,padding:"6px 16px",border:"1px solid #1e293b"}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#f59e0b",boxShadow:"0 0 8px #f59e0b"}}/>
              <span style={{color:"#f59e0b",fontWeight:800,fontSize:12}}>Level {level}</span>
              <span style={{color:"#334155"}}>·</span>
              <span style={{color:"#94a3b8",fontSize:12}}>{LEVEL_TITLES[level]}</span>
            </div>
            <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
              {RINGS.map(ring=><ArcRing key={ring.id} ring={ring} fill={ringFills[ring.id]} pulse={pulseRing===ring.id} size={size}/>)}
              <Avatar size={size} name={userName}/>
            </div>
            {skills.length===0 && (
              <div style={{textAlign:"center",color:"#334155",fontSize:13,padding:"0 10px",lineHeight:1.6}}>
                Chat with the coach on the left →<br/>Your skills will appear here as you talk
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:8,width:"100%"}}>
              {RINGS.map(ring=>(
                <div key={ring.id} style={{background:"#0a1628",borderRadius:10,padding:"10px 13px",border:`1px solid ${ring.color}18`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:ring.color,boxShadow:`0 0 7px ${ring.glow}`}}/>
                      <span style={{color:"#e2e8f0",fontSize:12,fontWeight:700}}>{ring.label}</span>
                    </div>
                    <span style={{color:ring.color,fontSize:11,fontWeight:800}}>{byRing[ring.id].length} skills</span>
                  </div>
                  <div style={{background:"#1e293b",borderRadius:999,height:4,overflow:"hidden",marginBottom:4}}>
                    <div style={{background:ring.color,height:"100%",borderRadius:999,width:`${ringFills[ring.id]*100}%`,transition:"width 1s ease",boxShadow:`0 0 6px ${ring.glow}`}}/>
                  </div>
                  <div style={{color:"#334155",fontSize:10}}>{ring.sublabel}</div>
                </div>
              ))}
            </div>
            <div style={{width:"100%",background:"#0a1628",borderRadius:12,padding:"12px 14px",border:"1px solid #1e293b"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <span style={{color:"#64748b",fontSize:11,fontWeight:600}}>Profile XP</span>
                <span style={{color:"#818cf8",fontSize:11,fontWeight:800}}>{xp} XP · {skills.length} skills</span>
              </div>
              <div style={{background:"#1e293b",borderRadius:999,height:8,overflow:"hidden"}}>
                <div style={{background:"linear-gradient(90deg,#6366f1,#a78bfa,#f472b6)",height:"100%",borderRadius:999,width:`${lvlPct*100}%`,transition:"width 1.2s ease",boxShadow:"0 0 10px #818cf8"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
                <span style={{color:"#334155",fontSize:10}}>{LEVEL_TITLES[level]}</span>
                {level<5&&<span style={{color:"#334155",fontSize:10}}>Next: {LEVEL_TITLES[level+1]}</span>}
              </div>
            </div>
          </div>
        )}
        {tab==="skills" && (
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {skills.length===0 ? (
              <div style={{textAlign:"center",color:"#334155",padding:"50px 0",fontSize:14}}>
                <div style={{fontSize:32,marginBottom:10}}>💬</div>Start chatting to discover your skills
              </div>
            ) : RINGS.map(ring => byRing[ring.id].length > 0 && (
              <div key={ring.id}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:ring.color,boxShadow:`0 0 6px ${ring.glow}`}}/>
                  <span style={{color:ring.color,fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.06em"}}>{ring.label}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {byRing[ring.id].map(s=>(
                    <div key={s.name} style={{background:ring.color+"14",border:`1px solid ${ring.color}38`,borderRadius:20,padding:"5px 11px",color:"#e2e8f0",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                      {s.name}<span style={{color:ring.color,fontSize:9}}>{"●".repeat(s.level)}{"○".repeat(5-s.level)}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
            {byRing.other.length > 0 && (
              <div>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#64748b"}}/>
                  <span style={{color:"#64748b",fontSize:11,fontWeight:800,textTransform:"uppercase",letterSpacing:"0.06em"}}>Other Skills</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {byRing.other.map(s=>(
                    <div key={s.name} style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:20,padding:"5px 11px",color:"#64748b",fontSize:12}}>{s.name}</div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
        {tab==="careers" && <CareersTab skills={skills}/>}
      </div>
    </div>
  );
}

function CareersTab({ skills }) {
  const [matches, setMatches] = useState(null);
  const [loading, setLoading] = useState(false);
  const CLUSTERS = [
    {id:"care",icon:"🤝",label:"Health & Social Care"},
    {id:"business",icon:"📊",label:"Business & Admin"},
    {id:"tech",icon:"💻",label:"Technology"},
    {id:"creative",icon:"🎨",label:"Creative & Media"},
    {id:"trades",icon:"🔧",label:"Trades & Operations"},
    {id:"education",icon:"📚",label:"Education & Training"},
    {id:"retail",icon:"🛍️",label:"Retail & Customer Service"},
    {id:"leadership",icon:"🏆",label:"Management & Leadership"},
  ];
  const analyze = async (cluster) => {
    if (!skills.length) return;
    setLoading(cluster.id); setMatches(null);
    const skillList = skills.map(s=>s.name).join(", ");
    const SYS = `Career advisor. Given skills and career cluster, return ONLY valid JSON no markdown:
{"matchScore":72,"headline":"One sentence summary","roles":[{"title":"Job Title","icon":"emoji","matchPct":85,"reason":"1 sentence","training":"Specific next step or free course"}],"gaps":["gap1","gap2"],"strengths":["strength1","strength2"]}
matchScore 0-100. Include 4-5 roles. 2-3 gaps and strengths. Be specific and encouraging.`;
    try {
      const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,system:SYS,messages:[{role:"user",content:`Skills: ${skillList}\nCareer cluster: ${cluster.label}`}]})});
      const data = await res.json();
      let t = data.content?.map(b=>b.text||"").join("")||"{}";
      setMatches({...JSON.parse(t.replace(/```json|```/g,"").trim()),cluster});
    } catch(e){console.error(e);}
    setLoading(false);
  };
  if (skills.length===0) return <div style={{textAlign:"center",color:"#334155",padding:"50px 0",fontSize:14}}><div style={{fontSize:32,marginBottom:10}}>🚀</div>Discover your skills first, then explore career matches</div>;
  if (loading) return <div style={{textAlign:"center",padding:"50px 0"}}><div style={{fontSize:28,marginBottom:12}}>🔍</div><div style={{color:"#64748b",fontSize:13,marginBottom:14}}>Matching your skills profile...</div><div style={{display:"flex",justifyContent:"center",gap:5}}>{[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#818cf8",animation:`pulse 1.2s ${i*0.2}s infinite`}}/>)}</div></div>;
  if (matches) return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:2}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{matches.cluster.icon}</span><span style={{color:"#f1f5f9",fontWeight:800,fontSize:15}}>{matches.cluster.label}</span></div>
          <div style={{color:"#64748b",fontSize:12,marginTop:2}}>{matches.headline}</div>
        </div>
        <div style={{position:"relative",width:62,height:62,flexShrink:0}}>
          <svg width="62" height="62" viewBox="0 0 62 62" style={{transform:"rotate(-90deg)"}}>
            <circle cx="31" cy="31" r="25" fill="none" stroke="#1e293b" strokeWidth="7"/>
            <circle cx="31" cy="31" r="25" fill="none" stroke="#818cf8" strokeWidth="7" strokeDasharray={`${2*Math.PI*25*matches.matchScore/100} 999`} strokeLinecap="round" style={{filter:"drop-shadow(0 0 4px #818cf8)"}}/>
          </svg>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
            <div style={{color:"#818cf8",fontWeight:900,fontSize:13,lineHeight:1}}>{matches.matchScore}%</div>
            <div style={{color:"#475569",fontSize:8}}>match</div>
          </div>
        </div>
      </div>
      <div style={{background:"#0a1628",borderRadius:10,padding:"10px 12px",border:"1px solid #10b98122"}}>
        <div style={{color:"#10b981",fontSize:11,fontWeight:700,marginBottom:6}}>✓ YOUR STRENGTHS HERE</div>
        {matches.strengths.map((s,i)=><div key={i} style={{color:"#94a3b8",fontSize:12,marginBottom:3,display:"flex",gap:6}}><span style={{color:"#10b981",flexShrink:0}}>▸</span>{s}</div>)}
      </div>
      {matches.roles.map((r,i)=>(
        <div key={i} style={{background:"#0a1628",borderRadius:12,padding:"12px 14px",border:"1px solid #1e293b"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
            <span style={{fontSize:16}}>{r.icon}</span>
            <span style={{color:"#f1f5f9",fontWeight:700,fontSize:13,flex:1}}>{r.title}</span>
            <span style={{color:"#818cf8",fontWeight:800,fontSize:12}}>{r.matchPct}%</span>
          </div>
          <div style={{background:"#1e293b",borderRadius:999,height:3,marginBottom:8}}>
            <div style={{background:"#818cf8",height:"100%",borderRadius:999,width:`${r.matchPct}%`,boxShadow:"0 0 4px #818cf8"}}/>
          </div>
          <p style={{margin:"0 0 6px",color:"#94a3b8",fontSize:12,lineHeight:1.55}}>{r.reason}</p>
          <div style={{display:"flex",gap:6,alignItems:"flex-start"}}><span style={{color:"#f59e0b",fontSize:11,flexShrink:0}}>📚</span><span style={{color:"#64748b",fontSize:11,lineHeight:1.4}}>{r.training}</span></div>
        </div>
      ))}
      <div style={{background:"#0a1628",borderRadius:10,padding:"10px 12px",border:"1px solid #f59e0b22"}}>
        <div style={{color:"#f59e0b",fontSize:11,fontWeight:700,marginBottom:6}}>⚡ SKILLS TO BUILD NEXT</div>
        {matches.gaps.map((g,i)=><div key={i} style={{color:"#94a3b8",fontSize:12,marginBottom:3,display:"flex",gap:6}}><span style={{color:"#f59e0b",flexShrink:0}}>+</span>{g}</div>)}
      </div>
      <button onClick={()=>setMatches(null)} style={{background:"transparent",border:"1px solid #1e293b",color:"#475569",borderRadius:10,padding:"9px",cursor:"pointer",fontSize:12,fontWeight:600}}>← Try another career area</button>
    </div>
  );
  return (
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <p style={{color:"#64748b",fontSize:13,lineHeight:1.65,marginBottom:4}}>Choose a career area to see how your skills match — including roles you might not have considered.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {CLUSTERS.map(c=>(
          <button key={c.id} className="cluster-btn" onClick={()=>analyze(c)} style={{background:"#0a1628",border:"1px solid #1e293b",borderRadius:12,padding:"13px 10px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>{c.icon}</span>
            <span style={{color:"#94a3b8",fontSize:12,fontWeight:600,lineHeight:1.3}}>{c.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function ChatPanel({ onSkillsUpdate, onXP, onPulse, onName }) {
  const [messages, setMessages] = useState([{role:"assistant",content:"Hi! Really glad you're here. 😊\n\nI'm going to help you discover skills you already have — and I think you might be surprised by what we find together. There are no right or wrong answers.\n\nLet's start easy: what's something you've done recently — at work, at home, or just in life — that you felt good about? It honestly doesn't have to be impressive."}]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [updating, setUpdating] = useState(false);
  const [userMsgCount, setUserMsgCount] = useState(0);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"})},[messages]);

  const CHIPS = ["I looked after my kids","I worked in retail / a shop","I volunteered for a charity","I managed a small team","I've been studying","I ran my own small business"];

  const extractAndUpdate = async (msgs) => {
    setUpdating(true);
    const convo = msgs.map(m=>`${m.role==="user"?"Person":"Coach"}: ${m.content}`).join("\n\n");
    const nameMatch = convo.match(/(?:my name is|i'm|i am|call me)\s+([A-Z][a-z]+)/i);
    if (nameMatch) onName(nameMatch[1]);
    const SYS = `Extract a skills profile from this coaching conversation. Return ONLY valid JSON no markdown:
{"skills":[{"name":"Skill Name","category":"Communication","level":3,"description":"How it showed up."}]}
Rules: Extract 8-24 skills. category: Communication, Leadership, Technical, Problem-Solving, Creative, Interpersonal, Organisation, Resilience, Digital, Customer Service. level 1-5. Include HIDDEN skills: "raised children" means patience, scheduling, teaching, conflict resolution, budgeting, emotional intelligence. Use plain professional language.`;
    try {
      const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,system:SYS,messages:[{role:"user",content:convo}]})});
      const data = await res.json();
      let t = data.content?.map(b=>b.text||"").join("")||"{}";
      const parsed = JSON.parse(t.replace(/```json|```/g,"").trim());
      const newSkills = parsed.skills||[];
      onSkillsUpdate(newSkills);
      const counts={};
      newSkills.forEach(s=>{ for(const ring of RINGS){ if(ring.skills.some(rs=>s.name.toLowerCase().includes(rs.toLowerCase().slice(0,5))||rs.toLowerCase().includes(s.name.toLowerCase().slice(0,5)))){ counts[ring.id]=(counts[ring.id]||0)+1; break; } } });
      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1])[0];
      if(top) onPulse(top[0]);
      onXP(newSkills.length * 120);
    } catch(e){console.error(e);}
    setUpdating(false);
  };

  const send = async (text) => {
    const msg = (text||input).trim();
    if (!msg || loading) return;
    const newMsgs = [...messages,{role:"user",content:msg}];
    setMessages(newMsgs); setInput(""); setLoading(true);
    const newCount = userMsgCount+1;
    setUserMsgCount(newCount);
    onXP(p => p + XP_PER_MSG);
    try {
      const res = await fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:COACH_SYSTEM,messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data = await res.json();
      const reply = data.content?.map(b=>b.text||"").join("")||"Sorry, something went wrong.";
      const finalMsgs=[...newMsgs,{role:"assistant",content:reply}];
      setMessages(finalMsgs);
      if (newCount % 3 === 0) extractAndUpdate(finalMsgs);
    } catch { setMessages(p=>[...p,{role:"assistant",content:"Something went wrong — please try again."}]); }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(),80);
  };

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{flex:1,overflowY:"auto",padding:"16px 14px",display:"flex",flexDirection:"column",gap:14}}>
        {messages.map((m,i)=>(
          <div key={i} className="msg-in" style={{display:"flex",flexDirection:"column",alignItems:m.role==="user"?"flex-end":"flex-start",gap:4}}>
            {m.role==="assistant" && (
              <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:1}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,boxShadow:"0 0 12px #6366f144"}}>🧠</div>
                <span style={{color:"#334155",fontSize:11,fontWeight:600}}>SkillMap Coach</span>
              </div>
            )}
            <div style={{maxWidth:"87%",padding:"12px 15px",borderRadius:m.role==="user"?"18px 18px 4px 18px":"4px 18px 18px 18px",background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#7c3aed)":"linear-gradient(135deg,#0d1b33,#0f172a)",color:"#f1f5f9",fontSize:14,lineHeight:1.75,border:m.role==="assistant"?"1px solid #1e293b":"none",whiteSpace:"pre-wrap"}}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#4f46e5,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center"}}>🧠</div>
            <div style={{display:"flex",gap:5,padding:"12px 15px",background:"#0d1b33",border:"1px solid #1e293b",borderRadius:"4px 18px 18px 18px"}}>
              {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#818cf8",animation:`pulse 1.2s ${i*0.2}s infinite`}}/>)}
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>
      {userMsgCount===0 && (
        <div style={{padding:"0 14px 10px",display:"flex",flexWrap:"wrap",gap:6}}>
          {CHIPS.map((s,i)=>(
            <button key={i} className="chip" onClick={()=>send(s)} style={{background:"#0a1628",border:"1px solid #1e293b",color:"#64748b",borderRadius:20,padding:"6px 13px",cursor:"pointer",fontSize:12,fontWeight:500}}>{s}</button>
          ))}
        </div>
      )}
      {userMsgCount>=4 && (
        <div style={{padding:"0 14px 8px"}}>
          <button className="update-btn" onClick={()=>extractAndUpdate(messages)} disabled={updating} style={{width:"100%",background:updating?"#1e293b":"linear-gradient(135deg,#4f46e5,#7c3aed,#db2777)",border:"none",color:"#fff",borderRadius:12,padding:"12px",cursor:updating?"not-allowed":"pointer",fontWeight:800,fontSize:13,boxShadow:updating?"none":"0 4px 20px #6366f144",transition:"opacity 0.2s",letterSpacing:"0.02em"}}>
            {updating?"✨  Updating your profile...":"✨  Update My Profile"}
          </button>
        </div>
      )}
      <div style={{padding:"10px 14px 16px",borderTop:"1px solid #0f172a"}}>
        <div style={{display:"flex",gap:8}}>
          <input ref={inputRef} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="Share something about yourself..." style={{flex:1,background:"#0d1b33",border:"1px solid #1e293b",borderRadius:12,padding:"12px 15px",color:"#f1f5f9",fontSize:14,outline:"none"}}/>
          <button onClick={()=>send()} disabled={loading||!input.trim()} style={{background:"linear-gradient(135deg,#4f46e5,#7c3aed)",border:"none",borderRadius:12,padding:"12px 18px",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:17,opacity:loading||!input.trim()?0.35:1,transition:"opacity 0.2s"}}>→</button>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [skills, setSkills] = useState([]);
  const [xp, setXP] = useState(0);
  const [pulseRing, setPulseRing] = useState(null);
  const [userName, setUserName] = useState("");
  const handlePulse = (id) => { setPulseRing(id); setTimeout(()=>setPulseRing(null),2200); };
  return (
    <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 20px",borderBottom:"1px solid #0a1628",background:"#060d1a",flexShrink:0,zIndex:20}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🧠</span>
          <span style={{fontWeight:900,fontSize:19,letterSpacing:"-0.5px",background:"linear-gradient(135deg,#818cf8,#a78bfa,#f472b6)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>SkillMap</span>
          <span style={{color:"#1e293b",fontSize:16}}>|</span>
          <span style={{color:"#1e293b",fontSize:12}}>Skills Discovery</span>
        </div>
        {skills.length>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,background:"#0a1628",borderRadius:20,padding:"5px 13px",border:"1px solid #1e293b"}}>
            <span style={{fontSize:11}}>⚡</span>
            <span style={{color:"#818cf8",fontWeight:700,fontSize:11}}>{xp} XP</span>
            <span style={{color:"#1e293b"}}>·</span>
            <span style={{color:"#334155",fontSize:11}}>{skills.length} skills found</span>
          </div>
        )}
      </header>
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>
        <div style={{flex:"0 0 50%",borderRight:"1px solid #0a1628",display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 14px 8px",borderBottom:"1px solid #0a1628",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#10b981",boxShadow:"0 0 6px #10b981"}}/>
            <span style={{color:"#334155",fontSize:12,fontWeight:600}}>AI Career Coach</span>
          </div>
          <ChatPanel onSkillsUpdate={setSkills} onXP={setXP} onPulse={handlePulse} onName={setUserName}/>
        </div>
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 14px 8px",borderBottom:"1px solid #0a1628",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:"#818cf8",boxShadow:"0 0 6px #818cf8"}}/>
            <span style={{color:"#334155",fontSize:12,fontWeight:600}}>Your Skills Profile</span>
            {skills.length>0&&<span style={{marginLeft:"auto",color:"#1e293b",fontSize:11}}>auto-updates as you chat</span>}
          </div>
          <ProfilePanel skills={skills} xp={xp} pulseRing={pulseRing} userName={userName}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
